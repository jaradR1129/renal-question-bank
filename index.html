<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRCU Question Bank</title>
    <style>
        /* Modern, Clean Variables */
        :root {
            --bg-main: #f0f4f8;
            --bg-card: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary: #3182ce;
            --primary-hover: #2b6cb0;
            --correct: #48bb78;
            --incorrect: #f56565;
            --unseen: #e2e8f0;
            --border: #e2e8f0;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s ease;
        }

        /* Dark Mode Variables */
        [data-theme="dark"] {
            --bg-main: #1a202c;
            --bg-card: #2d3748;
            --text-main: #f7fafc;
            --text-muted: #a0aec0;
            --primary: #63b3ed;
            --primary-hover: #4299e1;
            --unseen: #4a5568;
            --border: #4a5568;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            transition: var(--transition);
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .header h1 { margin: 0; font-size: 1.5rem; font-weight: 700; }
        
        /* Night Mode Toggle */
        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        /* Card Panels */
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 25px;
            margin-bottom: 20px;
            transition: var(--transition);
        }

        /* UI Views */
        #dashboard-view, #quiz-view, #results-view { display: none; }
        .active-view { display: block !important; }

        /* Dashboard & Stats Wheel */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media(min-width: 600px) {
            .dashboard-grid { grid-template-columns: 1fr 1fr; }
        }

        .stats-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The CSS Donut Chart */
        .donut-chart {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: conic-gradient(var(--correct) 0% 0%, var(--incorrect) 0% 0%, var(--unseen) 0% 100%);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            transition: background 0.5s ease-out;
        }
        .donut-hole {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: var(--bg-card);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
        }
        .donut-hole span.large { font-size: 1.8rem; font-weight: bold; }
        .donut-hole span.small { font-size: 0.8rem; color: var(--text-muted); }

        .stat-legend { width: 100%; display: flex; flex-direction: column; gap: 8px; }
        .legend-item { display: flex; justify-content: space-between; font-size: 0.95rem; font-weight: 600;}
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }

        /* Action Buttons */
        .action-btn {
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            border-radius: 12px;
            border: none;
            margin-bottom: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:active { background-color: var(--primary-hover); }
        
        .btn-secondary { background-color: var(--bg-main); color: var(--text-main); border: 1px solid var(--border); }
        .btn-secondary:active { background-color: var(--border); }

        /* Quiz UI */
        .progress-container {
            width: 100%; background-color: var(--border); border-radius: 8px; height: 8px; margin-bottom: 20px; overflow: hidden;
        }
        .progress-bar { height: 100%; background-color: var(--primary); width: 0%; transition: width 0.3s ease; }
        .question-text { font-size: 1.15rem; line-height: 1.6; margin-bottom: 25px; }
        
        .option-btn {
            width: 100%; padding: 15px; font-size: 1rem; text-align: left; background-color: var(--bg-main);
            color: var(--text-main); border: 2px solid transparent; border-radius: 12px; margin-bottom: 12px;
            cursor: pointer; transition: var(--transition); line-height: 1.4;
        }
        .option-btn:hover:not(:disabled) { border-color: var(--primary); }
        .option-btn.correct { background-color: rgba(72, 187, 120, 0.15); border-color: var(--correct); }
        .option-btn.incorrect { background-color: rgba(245, 101, 101, 0.15); border-color: var(--incorrect); }
        .option-btn:disabled { cursor: default; }

        #explanation-box {
            display: none; background-color: var(--bg-main); border-left: 4px solid var(--primary);
            padding: 18px; margin-top: 25px; border-radius: 0 12px 12px 0; font-size: 0.95rem; line-height: 1.6;
        }

        .header-stats { display: flex; justify-content: space-between; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px;}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>My Q-Bank</h1>
        <button class="theme-toggle" onclick="toggleTheme()">🌙 Night Mode</button>
    </div>

    <div id="dashboard-view" class="active-view">
        <div class="dashboard-grid">
            
            <div class="card stats-container">
                <div class="donut-chart" id="donut-chart">
                    <div class="donut-hole">
                        <span class="large" id="total-q">0</span>
                        <span class="small">Total Q's</span>
                    </div>
                </div>
                
                <div class="stat-legend">
                    <div class="legend-item">
                        <span><span class="dot" style="background: var(--correct);"></span>Correct</span>
                        <span id="stat-correct">0</span>
                    </div>
                    <div class="legend-item">
                        <span><span class="dot" style="background: var(--incorrect);"></span>Incorrect</span>
                        <span id="stat-incorrect">0</span>
                    </div>
                    <div class="legend-item">
                        <span><span class="dot" style="background: var(--unseen);"></span>Remaining</span>
                        <span id="stat-remaining">0</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3 style="margin-top: 0; margin-bottom: 20px;">Study Actions</h3>
                <button class="action-btn btn-primary" onclick="startQuiz('unused', 10)">
                    <span>Study 10 New Questions</span> <span>→</span>
                </button>
                <button class="action-btn btn-secondary" onclick="startQuiz('missed', 'all')">
                    <span>Review Missed Questions</span> <span id="btn-missed-count">(0)</span>
                </button>
                <button class="action-btn btn-secondary" onclick="startQuiz('all', 5)">
                    <span>Quick 5 Question Mix</span> <span>→</span>
                </button>
            </div>
        </div>
    </div>

    <div id="quiz-view" class="card">
        <div class="header-stats">
            <span id="question-counter">Question 1 / 10</span>
            <button onclick="returnToDashboard()" style="background:none; border:none; color:var(--primary); font-weight:bold; cursor:pointer; padding:0;">Quit</button>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="question-text" id="question-text"></div>
        <div id="options-container"></div>

        <div id="explanation-box">
            <strong style="display:block; margin-bottom:8px; color:var(--primary);">Explanation:</strong>
            <div id="explanation-text" style="margin-bottom: 20px;"></div>
            <button class="action-btn btn-primary" onclick="nextQuestion()" style="margin-bottom: 0;">Next Question</button>
        </div>
    </div>

    <div id="results-view" class="card" style="text-align: center;">
        <h2 style="font-size: 2rem; margin-bottom: 10px;">Session Complete!</h2>
        <p style="font-size: 1.2rem; color: var(--text-muted); margin-bottom: 30px;">You scored <strong id="score-text" style="color: var(--text-main);"></strong>.</p>
        <button class="action-btn btn-primary" onclick="returnToDashboard()">Return to Dashboard</button>
    </div>
</div>

<script>
    // --- DATA (Trial Setup) ---
    const allQuestions = [
        {
            id: 1,
            question: "An 18-year-old white man presents to your office after developing gross hematuria. Your physical examination reveals some papules on his face and neck. They are 1-3 mm in size and are nontender. BP is normal, and serum creatinine is 1.2 mg/dL. Urinalysis reveals a pattern of uniformly shaped red blood cells in greater than 100 cells per high power field. The patient has completed high school, but he was known as a very slow learner and a poor student. Imaging his kidneys reveals some cystic change in both kidneys and a solid-looking vascular mass in the right kidney.\n\nWhat is the MOST likely diagnosis?",
            options: ["A. Renal cell carcinoma", "B. ADPKD", "C. Autosomal recessive PKD", "D. Tuberous sclerosis", "E. Von Hippel-Lindau syndrome"],
            correctIndex: 3,
            explanation: "The patient described the skin lesions and renal findings of tuberous sclerosis. The renal lesions are typically angiomyolipomas and can bleed..."
        },
        {
            id: 2,
            question: "Which of the following can cause calcium oxalate nephropathy due to fat malabsorption?",
            options: ["A. Primary hyperoxaluria", "B. Excessive ingestion of snack foods containing orlistat", "C. Ethylene glycol ingestion"],
            correctIndex: 1,
            explanation: "Calcium oxalate nephropathy has been described from fat malabsorption resulting from the excessive ingestion of snack foods containing orlistat..."
        },
        {
            id: 3,
            question: "Sample Question 3 (Added for testing the stats wheel): What is 2 + 2?",
            options: ["A. 3", "B. 4", "C. 5"],
            correctIndex: 1,
            explanation: "Basic math principle."
        }
    ];

    // --- STATE & LOCAL STORAGE ---
    let currentQuiz = [];
    let currentIndex = 0;
    let currentScore = 0;
    
    let userStats = JSON.parse(localStorage.getItem('brcuStatsV2')) || {
        correctIds: [],
        missedIds: [],
        seenIds: []
    };

    function saveStats() { localStorage.setItem('brcuStatsV2', JSON.stringify(userStats)); }

    // --- THEME LOGIC ---
    function toggleTheme() {
        const body = document.body;
        const btn = document.querySelector('.theme-toggle');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            btn.innerText = '🌙 Night Mode';
            localStorage.setItem('brcuTheme', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerText = '☀️ Light Mode';
            localStorage.setItem('brcuTheme', 'dark');
        }
    }
    
    // Load saved theme
    if (localStorage.getItem('brcuTheme') === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
        document.querySelector('.theme-toggle').innerText = '☀️ Light Mode';
    }

    // --- DASHBOARD LOGIC ---
    function updateDashboard() {
        const total = allQuestions.length;
        // Make sure correct and missed don't overlap in stats
        const correct = userStats.correctIds.length;
        const missed = userStats.missedIds.length;
        const unseen = total - correct - missed;

        document.getElementById('total-q').innerText = total;
        document.getElementById('stat-correct').innerText = correct;
        document.getElementById('stat-incorrect').innerText = missed;
        document.getElementById('stat-remaining').innerText = unseen;
        document.getElementById('btn-missed-count').innerText = `(${missed})`;

        // Update Wheel using conic-gradient
        const correctPct = (correct / total) * 100;
        const missedPct = (missed / total) * 100;
        
        const wheel = document.getElementById('donut-chart');
        wheel.style.background = `conic-gradient(
            var(--correct) 0% ${correctPct}%, 
            var(--incorrect) ${correctPct}% ${correctPct + missedPct}%, 
            var(--unseen) ${correctPct + missedPct}% 100%
        )`;
    }

    // --- QUIZ LOGIC ---
    function startQuiz(filterType, count) {
        let pool = [];
        if (filterType === 'all') pool = [...allQuestions];
        if (filterType === 'unused') pool = allQuestions.filter(q => !userStats.correctIds.includes(q.id) && !userStats.missedIds.includes(q.id));
        if (filterType === 'missed') pool = allQuestions.filter(q => userStats.missedIds.includes(q.id));

        if (pool.length === 0) {
            alert("No questions available for this category!");
            return;
        }

        pool = pool.sort(() => Math.random() - 0.5);
        const limit = count === 'all' ? pool.length : Math.min(parseInt(count), pool.length);
        currentQuiz = pool.slice(0, limit);
        
        currentIndex = 0;
        currentScore = 0;
        
        document.getElementById('dashboard-view').classList.remove('active-view');
        document.getElementById('quiz-view').classList.add('active-view');
        
        loadQuestion();
    }

    function loadQuestion() {
        const q = currentQuiz[currentIndex];
        document.getElementById('question-counter').innerText = `Question ${currentIndex + 1} of ${currentQuiz.length}`;
        document.getElementById('progress-bar').style.width = `${((currentIndex) / currentQuiz.length) * 100}%`;
        
        document.getElementById('question-text').innerText = q.question;
        document.getElementById('explanation-box').style.display = 'none';
        
        const optsContainer = document.getElementById('options-container');
        optsContainer.innerHTML = '';
        
        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(index, btn);
            optsContainer.appendChild(btn);
        });
    }

    function handleAnswer(selectedIndex, btnElement) {
        const q = currentQuiz[currentIndex];
        const allBtns = document.getElementById('options-container').querySelectorAll('button');
        allBtns.forEach(b => b.disabled = true);
        
        if (!userStats.seenIds.includes(q.id)) userStats.seenIds.push(q.id);

        if (selectedIndex === q.correctIndex) {
            btnElement.classList.add('correct');
            currentScore++;
            
            // Manage Arrays
            if (!userStats.correctIds.includes(q.id)) userStats.correctIds.push(q.id);
            userStats.missedIds = userStats.missedIds.filter(id => id !== q.id);
        } else {
            btnElement.classList.add('incorrect');
            allBtns[q.correctIndex].classList.add('correct');
            
            // Manage Arrays
            if (!userStats.missedIds.includes(q.id)) userStats.missedIds.push(q.id);
            userStats.correctIds = userStats.correctIds.filter(id => id !== q.id);
        }
        
        saveStats();
        
        document.getElementById('explanation-text').innerText = q.explanation;
        document.getElementById('explanation-box').style.display = 'block';
        document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / currentQuiz.length) * 100}%`;
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentQuiz.length) {
            loadQuestion();
        } else {
            document.getElementById('quiz-view').classList.remove('active-view');
            document.getElementById('results-view').classList.add('active-view');
            document.getElementById('score-text').innerText = `${currentScore} out of ${currentQuiz.length}`;
        }
    }

    function returnToDashboard() {
        document.getElementById('quiz-view').classList.remove('active-view');
        document.getElementById('results-view').classList.remove('active-view');
        document.getElementById('dashboard-view').classList.add('active-view');
        updateDashboard();
    }

    // Init
    updateDashboard();
</script>

</body>
</html>
